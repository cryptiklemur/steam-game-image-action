# Publish the public, game-free runtime-base image to GHCR.
# Runs on a version tag (vN.N.N) and on manual dispatch. Contains NO game files.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  runtime-base:
    name: build+push runtime-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push runtime-base
        run: |
          set -euo pipefail
          IMG="ghcr.io/${{ github.repository }}/runtime-base"
          docker build --pull -f Dockerfile.runtime-base -t "$IMG:latest" .
          docker push "$IMG:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            docker tag "$IMG:latest" "$IMG:${{ github.ref_name }}"
            docker push "$IMG:${{ github.ref_name }}"
          fi
