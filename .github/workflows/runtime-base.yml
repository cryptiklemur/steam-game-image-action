name: runtime-base

# The public, game-free base the action appends the game layer onto. The action
# always consumes runtime-base:latest, so this only needs to rebuild when its
# Dockerfile changes (or on demand) - not on every action release.
on:
  push:
    branches: [main]
    paths:
      - Dockerfile.runtime-base
      - .github/workflows/runtime-base.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  runtime-base:
    name: build+push runtime-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      - name: Build and push runtime-base
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/${REPO}/runtime-base"
          docker build --pull -f Dockerfile.runtime-base -t "$IMG:latest" .
          docker push "$IMG:latest"
