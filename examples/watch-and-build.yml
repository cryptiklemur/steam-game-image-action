# Drop this in YOUR repo at .github/workflows/rimworld-image-watch.yml
# This IS the watcher: it runs on a schedule and rebuilds ONLY when Steam has a new
# build. The action's build-id gate makes each scheduled run cheap when nothing
# changed (it checks the published buildid against your image's steam.buildid label
# and downloads nothing if they match). Uses the reusable workflow for brevity.
name: rimworld-image-watch

on:
  workflow_dispatch:
  schedule:
    # every 30 min; off the :00/:30 marks to be a good registry/Steam citizen
    - cron: "7,37 * * * *"

jobs:
  build:
    uses: cryptiklemur/steam-game-image-action/.github/workflows/build-image.yml@v1
    with:
      image: ghcr.io/${{ github.repository_owner }}/rimworld-game
      steam-username: your-steam-account
      app-id: "294100"
      branch: public
      runnable: "true"
      skip-if-unchanged: "true"
    secrets:
      steam-config-vdf: ${{ secrets.STEAM_CONFIG_VDF }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
